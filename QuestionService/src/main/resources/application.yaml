spring:
  application:
    name: QUESTION-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/quizzy
    username: ${db-username}
    password: ${db-password}

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

server:
  port: 8082

eureka:
  instance:
    client:
      serverUrl:
        defaultZone: http://localhost:8761/eureka/